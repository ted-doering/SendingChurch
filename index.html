  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to

    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f4a31bf5-2b81-471f-bb89-cf3209867bfd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    * { margin: 0; box-sizing: border-box; }\n    body { background: #005f7b; }\n    input::placeholder { color: #9bb4b9; }\n    ::selection { background: #d2643c; color: #fff; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#005f7b;font-family:Montserrat,system-ui,sans-serif;padding:44px 24px 80px;color:#f4f0e7\">\n  <div style=\"max-width:1120px;margin:0 auto\">\n\n    <!-- HEADER -->\n    <div style=\"text-align:center;max-width:760px;margin:0 auto 40px\">\n      <img src=\"767f290a-ce24-46e1-9ea7-0d5554b5e774\" alt=\"Harvest Partnership\" style=\"display:block;width:96px;height:96px;object-fit:contain;margin:0 auto 18px\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:.24em;color:#9fc4cc;text-transform:uppercase;margin-bottom:20px\">Harvest Partnership &nbsp;·&nbsp; The Five Capitals<\u002Fdiv>\n      <h1 style=\"font-family:Montserrat,sans-serif;font-size:56px;line-height:1.02;font-weight:800;color:#f4f0e7;letter-spacing:-0.02em;margin-bottom:20px\">The Sending Church<\u002Fh1>\n      <p style=\"font-size:17px;line-height:1.6;color:#cfe3e7;font-weight:400;max-width:620px;margin:0 auto\">Every healthy church is meant to reproduce. This is a discernment and readiness tool for sending-church leadership — weighing all five capitals across three seasons: discovering the call, preparing to plant, and supporting the plant after launch.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- FIVE CAPITALS LEGEND -->\n    <div style=\"background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:22px 26px;margin-bottom:22px\">\n      <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:16px\">\n        <span style=\"font-size:13px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#f4f0e7\">The Five Capitals<\u002Fspan>\n        <span style=\"font-size:13px;color:#9fc4cc;line-height:1.5\">Listed in ascending order of worth — we spend the lower to grow the higher. Spiritual capital is the treasure a sending church exists to multiply.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px\">\n        <sc-for list=\"{{ capitals }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;gap:10px;align-items:flex-start\">\n            <span style=\"flex:none;margin-top:3px;width:11px;height:11px;border-radius:50%;background:{{ c.color }}\"><\u002Fspan>\n            <div>\n              <div style=\"font-size:14px;font-weight:700;color:#f4f0e7\">{{ c.label }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;line-height:1.45;color:#a7c6cc;margin-top:2px\">{{ c.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- PROGRESS -->\n    <div style=\"background:#f4f1e8;border-radius:16px;padding:24px 28px;margin-bottom:26px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:14px\">\n        <div>\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8a9990\">Readiness<\u002Fdiv>\n          <div style=\"font-size:15px;color:#20393f;font-weight:600;margin-top:2px\">{{ doneCount }} of {{ totalCount }} steps affirmed<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:Montserrat,sans-serif;font-size:44px;font-weight:800;line-height:1;color:#005f7b\">{{ pctLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:12px;border-radius:99px;background:rgba(16,58,70,0.12);overflow:hidden\">\n        <div style=\"{{ barStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:20px\">\n        <sc-for list=\"{{ phaseProgress }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"border-top:2px solid rgba(16,58,70,0.1);padding-top:10px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n              <span style=\"font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#103a46\">{{ p.num }} · {{ p.label }}<\u002Fspan>\n              <span style=\"font-size:12px;font-weight:700;color:#5b7075\">{{ p.done }}/{{ p.total }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:6px;border-radius:99px;background:rgba(16,58,70,0.1);overflow:hidden;margin-top:8px\">\n              <div style=\"{{ p.barStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- VIEW TOGGLE -->\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:22px\">\n      <div style=\"display:flex;gap:6px;background:rgba(255,255,255,0.08);padding:5px;border-radius:12px\">\n        <button onclick=\"{{ viewLedger }}\" style=\"{{ ledgerBtn }}\">Ledger<\u002Fbutton>\n        <button onclick=\"{{ viewTable }}\" style=\"{{ tableBtn }}\">Matrix<\u002Fbutton>\n        <button onclick=\"{{ viewJourney }}\" style=\"{{ journeyBtn }}\">Journey<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px\">\n        <span style=\"font-size:12.5px;color:#9fc4cc;max-width:340px;line-height:1.4\">{{ viewHint }}<\u002Fspan>\n        <button onclick=\"{{ reset }}\" style=\"font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#cfe3e7;background:none;border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:8px 14px;cursor:pointer\" style-hover=\"border-color:#d2643c;color:#fff\">Reset<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LEDGER VIEW -->\n    <sc-if value=\"{{ isLedger }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;align-items:start\">\n        <sc-for list=\"{{ ledgerColumns }}\" as=\"col\" hint-placeholder-count=\"5\">\n          <div style=\"background:#f4f1e8;border-radius:16px;padding:22px 24px 10px\">\n            <div style=\"display:flex;align-items:center;gap:11px\">\n              <span style=\"width:14px;height:14px;border-radius:50%;background:{{ col.color }}\"><\u002Fspan>\n              <h3 style=\"margin:0;font-family:Montserrat,sans-serif;font-size:21px;font-weight:700;color:#103a46\">{{ col.label }}<\u002Fh3>\n              <span style=\"margin-left:auto;font-size:12px;font-weight:700;color:#8a9990\">{{ col.done }}/{{ col.total }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:8px 0 12px;font-size:12.5px;line-height:1.5;color:#5b7075\">{{ col.desc }}<\u002Fp>\n            <sc-for list=\"{{ col.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n              <dc-import name=\"SendingItem\" id=\"{{ it.id }}\" text=\"{{ it.text }}\" checked=\"{{ it.checked }}\" phase-label=\"{{ it.phaseLabel }}\" capital-color=\"{{ it.capitalColor }}\" capital-label=\"{{ it.capitalLabel }}\" show-phase=\"{{ true }}\" show-capital=\"{{ false }}\" on-toggle=\"{{ toggle }}\" on-commit=\"{{ commit }}\" hint-size=\"100%,60px\"><\u002Fdc-import>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- MATRIX VIEW -->\n    <sc-if value=\"{{ isTable }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch\">\n        <div style=\"min-width:900px;background:#f4f1e8;border-radius:16px;overflow:hidden\">\n          <!-- header row -->\n          <div style=\"display:flex;background:#103a46\">\n            <div style=\"width:172px;flex:none;padding:16px 18px\"><\u002Fdiv>\n            <sc-for list=\"{{ phases }}\" as=\"ph\" hint-placeholder-count=\"3\">\n              <div style=\"flex:1;padding:16px 18px;border-left:1px solid rgba(255,255,255,0.08)\">\n                <div style=\"font-size:10px;font-weight:700;letter-spacing:.14em;color:#7ba7b0\">{{ ph.num }}<\u002Fdiv>\n                <div style=\"font-size:17px;font-weight:700;color:#f4f0e7;margin-top:2px\">{{ ph.label }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9fc4cc;margin-top:3px;line-height:1.35\">{{ ph.q }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <!-- capital rows -->\n          <sc-for list=\"{{ tableRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;border-top:1px solid rgba(16,58,70,0.1)\">\n              <div style=\"width:172px;flex:none;padding:16px 18px;display:flex;align-items:center;gap:9px;background:#eae5d7\">\n                <span style=\"width:11px;height:11px;border-radius:50%;background:{{ row.color }}\"><\u002Fspan>\n                <span style=\"font-size:14px;font-weight:700;color:#103a46\">{{ row.label }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1;padding:6px 16px;border-left:1px solid rgba(16,58,70,0.08);background:#faf8f2\">\n                <sc-for list=\"{{ row.c0.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                  <dc-import name=\"SendingItem\" id=\"{{ it.id }}\" text=\"{{ it.text }}\" checked=\"{{ it.checked }}\" capital-color=\"{{ it.capitalColor }}\" capital-label=\"{{ it.capitalLabel }}\" phase-label=\"{{ it.phaseLabel }}\" show-phase=\"{{ false }}\" show-capital=\"{{ false }}\" on-toggle=\"{{ toggle }}\" on-commit=\"{{ commit }}\" hint-size=\"100%,56px\"><\u002Fdc-import>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"flex:1;padding:6px 16px;border-left:1px solid rgba(16,58,70,0.08);background:#faf8f2\">\n                <sc-for list=\"{{ row.c1.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                  <dc-import name=\"SendingItem\" id=\"{{ it.id }}\" text=\"{{ it.text }}\" checked=\"{{ it.checked }}\" capital-color=\"{{ it.capitalColor }}\" capital-label=\"{{ it.capitalLabel }}\" phase-label=\"{{ it.phaseLabel }}\" show-phase=\"{{ false }}\" show-capital=\"{{ false }}\" on-toggle=\"{{ toggle }}\" on-commit=\"{{ commit }}\" hint-size=\"100%,56px\"><\u002Fdc-import>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"flex:1;padding:6px 16px;border-left:1px solid rgba(16,58,70,0.08);background:#faf8f2\">\n                <sc-for list=\"{{ row.c2.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                  <dc-import name=\"SendingItem\" id=\"{{ it.id }}\" text=\"{{ it.text }}\" checked=\"{{ it.checked }}\" capital-color=\"{{ it.capitalColor }}\" capital-label=\"{{ it.capitalLabel }}\" phase-label=\"{{ it.phaseLabel }}\" show-phase=\"{{ false }}\" show-capital=\"{{ false }}\" on-toggle=\"{{ toggle }}\" on-commit=\"{{ commit }}\" hint-size=\"100%,56px\"><\u002Fdc-import>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- JOURNEY VIEW -->\n    <sc-if value=\"{{ isJourney }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:26px\">\n        <sc-for list=\"{{ journeyPhases }}\" as=\"ph\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"display:flex;align-items:flex-start;gap:18px;margin-bottom:14px\">\n              <div style=\"flex:none;font-family:Montserrat,sans-serif;font-size:52px;font-weight:800;line-height:0.9;color:rgba(255,255,255,0.35)\">{{ ph.num }}<\u002Fdiv>\n              <div style=\"flex:1\">\n                <h2 style=\"margin:0;font-family:Montserrat,sans-serif;font-size:28px;font-weight:800;color:#f4f0e7\">{{ ph.label }}<\u002Fh2>\n                <div style=\"font-size:14px;font-weight:600;color:#9fc4cc;margin-top:2px\">{{ ph.q }}<\u002Fdiv>\n                <p style=\"font-size:14px;line-height:1.55;color:#cfe3e7;margin-top:8px;max-width:640px\">{{ ph.blurb }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"flex:none;text-align:right\">\n                <div style=\"font-family:Montserrat,sans-serif;font-size:26px;font-weight:800;color:#f4f0e7\">{{ ph.pctLabel }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9fc4cc;font-weight:600\">{{ ph.done }}/{{ ph.total }} done<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#f4f1e8;border-radius:16px;padding:14px 26px\">\n              <sc-for list=\"{{ ph.items }}\" as=\"it\" hint-placeholder-count=\"5\">\n                <dc-import name=\"SendingItem\" id=\"{{ it.id }}\" text=\"{{ it.text }}\" checked=\"{{ it.checked }}\" capital-color=\"{{ it.capitalColor }}\" capital-label=\"{{ it.capitalLabel }}\" phase-label=\"{{ it.phaseLabel }}\" show-phase=\"{{ false }}\" show-capital=\"{{ true }}\" on-toggle=\"{{ toggle }}\" on-commit=\"{{ commit }}\" hint-size=\"100%,60px\"><\u002Fdc-import>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"text-align:center;margin-top:44px;font-size:12px;color:#7ba7b0;letter-spacing:.04em\">Your progress is saved on this device. Click any step to edit its wording for your context.<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem('sendingChurch_v1') || '{}'); } catch (e) {}\n    this.state = { view: 'ledger', checked: saved.checked || {}, custom: saved.custom || {} };\n  }\n\n  CAPITALS = [\n    { key: 'spiritual', label: 'Spiritual', color: '#1f80a6', desc: 'Wisdom, character, and spiritual health — the treasure everything else serves.' },\n    { key: 'relational', label: 'Relational', color: '#d2643c', desc: 'The people, community, and networks we can invest and send.' },\n    { key: 'physical', label: 'Physical', color: '#bf8d1c', desc: 'Time, energy, space, and logistics we are able to give away.' },\n    { key: 'intellectual', label: 'Intellectual', color: '#5e8a3c', desc: 'Knowledge, training, strategy, and hard-won experience.' },\n    { key: 'financial', label: 'Financial', color: '#c06f2b', desc: 'Money and material resources committed to the mission.' }\n  ];\n\n  PHASES = [\n    { key: 'discover', num: '01', label: 'Discover', q: 'Can our church be a sending church?', blurb: 'Discern the calling, count the cost, and honestly weigh whether we are ready to give our best people away.' },\n    { key: 'prepare', num: '02', label: 'Prepare', q: 'Leading up to the plant', blurb: 'Build the team, the plan, and the partnership that carry a healthy plant all the way to launch day.' },\n    { key: 'support', num: '03', label: 'Support', q: 'After the launch', blurb: 'Keep covering, funding, and caring for the plant until it stands on its own — and begins to send in turn.' }\n  ];\n\n  ITEMS = [\n    { id: 'd1', phase: 'discover', capital: 'spiritual', text: \"Sense a clear, prayed-over conviction that sending is part of our church's calling\" },\n    { id: 'd2', phase: 'discover', capital: 'spiritual', text: 'Commit leadership to a season of prayer and fasting for multiplication' },\n    { id: 'd3', phase: 'discover', capital: 'spiritual', text: 'Discern whether a true sending culture — not only a giving culture — is forming in us' },\n    { id: 'd4', phase: 'discover', capital: 'relational', text: 'Notice and name potential planters already among us' },\n    { id: 'd5', phase: 'discover', capital: 'relational', text: 'Build relationship with a planting network, denomination, or partner church' },\n    { id: 'd6', phase: 'discover', capital: 'relational', text: 'Test elder and staff unity around the real cost of sending people out' },\n    { id: 'd7', phase: 'discover', capital: 'physical', text: 'Honestly assess our margin — do we have the people and energy to give away?' },\n    { id: 'd8', phase: 'discover', capital: 'physical', text: 'Map our current ministry load against what sending will require' },\n    { id: 'd9', phase: 'discover', capital: 'intellectual', text: 'Study the biblical and theological case for multiplication as an elder team' },\n    { id: 'd10', phase: 'discover', capital: 'intellectual', text: 'Learn from churches who have sent — including their mistakes' },\n    { id: 'd11', phase: 'discover', capital: 'intellectual', text: \"Define what 'sending church' will actually mean for us\" },\n    { id: 'd12', phase: 'discover', capital: 'financial', text: 'Review the budget for what could be redirected toward planting' },\n    { id: 'd13', phase: 'discover', capital: 'financial', text: \"Assess the congregation's giving health and reserves\" },\n\n    { id: 'p1', phase: 'prepare', capital: 'spiritual', text: 'Commission and spiritually cover the planter and core team' },\n    { id: 'p2', phase: 'prepare', capital: 'spiritual', text: \"Disciple the planter's walk with God, marriage, and family\" },\n    { id: 'p3', phase: 'prepare', capital: 'spiritual', text: 'Cast the vision to the whole congregation and invite them in' },\n    { id: 'p4', phase: 'prepare', capital: 'relational', text: 'Recruit and release a healthy core team to go' },\n    { id: 'p5', phase: 'prepare', capital: 'relational', text: 'Formalize the partnership with a written covenant or agreement' },\n    { id: 'p6', phase: 'prepare', capital: 'relational', text: 'Connect the planter to a coach and a peer cohort' },\n    { id: 'p7', phase: 'prepare', capital: 'physical', text: 'Help secure a launch location and gathering space' },\n    { id: 'p8', phase: 'prepare', capital: 'physical', text: 'Provide setup, tech, childcare, and administrative support' },\n    { id: 'p9', phase: 'prepare', capital: 'physical', text: 'Set a realistic launch timeline with clear milestones' },\n    { id: 'p10', phase: 'prepare', capital: 'intellectual', text: 'Put the planter through a formal assessment or behavioral interview' },\n    { id: 'p11', phase: 'prepare', capital: 'intellectual', text: \"Develop the plant's vision, values, and strategy on paper\" },\n    { id: 'p12', phase: 'prepare', capital: 'intellectual', text: 'Train the core team in evangelism, hospitality, and discipleship' },\n    { id: 'p13', phase: 'prepare', capital: 'financial', text: 'Commit multi-year funding with a clear step-down plan' },\n    { id: 'p14', phase: 'prepare', capital: 'financial', text: 'Help the planter build a partner-development / fundraising plan' },\n    { id: 'p15', phase: 'prepare', capital: 'financial', text: 'Establish financial accountability and regular reporting' },\n\n    { id: 's1', phase: 'support', capital: 'spiritual', text: 'Keep interceding for the plant and its leaders' },\n    { id: 's2', phase: 'support', capital: 'spiritual', text: 'Give the planter pastoral care and a safe place to be honest' },\n    { id: 's3', phase: 'support', capital: 'spiritual', text: 'Celebrate baptisms and stories of life change with our congregation' },\n    { id: 's4', phase: 'support', capital: 'relational', text: 'Hold regular check-ins between sending and planting leadership' },\n    { id: 's5', phase: 'support', capital: 'relational', text: \"Send short-term teams to serve the plant's outreach\" },\n    { id: 's6', phase: 'support', capital: 'relational', text: \"Keep the plant present in our church's prayers and updates\" },\n    { id: 's7', phase: 'support', capital: 'physical', text: 'Loan equipment, space, or staff time as needs arise' },\n    { id: 's8', phase: 'support', capital: 'physical', text: 'Guard against overextending — sustain support without burning out' },\n    { id: 's9', phase: 'support', capital: 'intellectual', text: 'Debrief often and capture lessons for the next sending' },\n    { id: 's10', phase: 'support', capital: 'intellectual', text: 'Provide ongoing coaching and leadership development' },\n    { id: 's11', phase: 'support', capital: 'intellectual', text: 'Help evaluate health beyond attendance numbers' },\n    { id: 's12', phase: 'support', capital: 'financial', text: 'Honor the funding commitment and revisit the step-down plan' },\n    { id: 's13', phase: 'support', capital: 'financial', text: 'Help the plant move toward financial self-sustainability' },\n    { id: 's14', phase: 'support', capital: 'financial', text: 'Help the plant begin its own fund to send in turn' }\n  ];\n\n  save() {\n    try { localStorage.setItem('sendingChurch_v1', JSON.stringify({ checked: this.state.checked, custom: this.state.custom })); } catch (e) {}\n  }\n  toggle = (id) => {\n    this.setState(s => { const c = { ...s.checked }; if (c[id]) delete c[id]; else c[id] = true; return { checked: c }; }, () => this.save());\n  };\n  commit = (id, text) => {\n    this.setState(s => ({ custom: { ...s.custom, [id]: text } }), () => this.save());\n  };\n  reset = () => {\n    if (!confirm('Clear all checkmarks and edits? This cannot be undone.')) return;\n    this.setState({ checked: {}, custom: {} }, () => this.save());\n  };\n  setView = (v) => this.setState({ view: v });\n\n  fillStyle(pct, color) {\n    return { width: pct + '%', height: '100%', borderRadius: '99px', background: color, transition: 'width .4s cubic-bezier(.4,0,.2,1)' };\n  }\n  toggleBtn(active) {\n    return {\n      fontFamily: 'Montserrat, sans-serif', fontSize: '13px', fontWeight: 700, letterSpacing: '.04em',\n      padding: '9px 20px', borderRadius: '9px', border: 'none', cursor: 'pointer',\n      background: active ? '#f4f1e8' : 'transparent',\n      color: active ? '#103a46' : '#9fc4cc',\n      transition: 'all .15s ease'\n    };\n  }\n\n  renderVals() {\n    const { view, checked, custom } = this.state;\n    const capMap = {}; this.CAPITALS.forEach(c => capMap[c.key] = c);\n    const phMap = {}; this.PHASES.forEach(p => phMap[p.key] = p);\n\n    const merged = this.ITEMS.map(it => ({\n      id: it.id, phase: it.phase, capital: it.capital,\n      text: custom[it.id] || it.text,\n      checked: !!checked[it.id],\n      capitalColor: capMap[it.capital].color,\n      capitalLabel: capMap[it.capital].label,\n      phaseLabel: phMap[it.phase].label\n    }));\n\n    const total = merged.length;\n    const done = merged.filter(m => m.checked).length;\n    const pct = total ? Math.round((done / total) * 100) : 0;\n\n    const ledgerColumns = this.CAPITALS.map(c => {\n      const items = merged.filter(m => m.capital === c.key);\n      const d = items.filter(m => m.checked).length;\n      return { ...c, items, done: d, total: items.length };\n    });\n\n    const phaseProgress = this.PHASES.map(p => {\n      const items = merged.filter(m => m.phase === p.key);\n      const d = items.filter(m => m.checked).length;\n      const pp = items.length ? Math.round((d / items.length) * 100) : 0;\n      return { num: p.num, label: p.label, done: d, total: items.length, barStyle: this.fillStyle(pp, '#005f7b') };\n    });\n\n    const journeyPhases = this.PHASES.map(p => {\n      const items = merged.filter(m => m.phase === p.key);\n      const d = items.filter(m => m.checked).length;\n      const pp = items.length ? Math.round((d / items.length) * 100) : 0;\n      return { num: p.num, label: p.label, q: p.q, blurb: p.blurb, items, done: d, total: items.length, pctLabel: pp + '%' };\n    });\n\n    const tableRows = this.CAPITALS.map(c => ({\n      label: c.label, color: c.color,\n      c0: { items: merged.filter(m => m.capital === c.key && m.phase === 'discover') },\n      c1: { items: merged.filter(m => m.capital === c.key && m.phase === 'prepare') },\n      c2: { items: merged.filter(m => m.capital === c.key && m.phase === 'support') }\n    }));\n\n    const hints = {\n      ledger: 'By capital — what are we investing across every season?',\n      table: 'The full grid — five capitals across three seasons.',\n      journey: 'Walk the path in order: Discover → Prepare → Support.'\n    };\n\n    return {\n      capitals: this.CAPITALS,\n      phases: this.PHASES,\n      doneCount: done, totalCount: total, pctLabel: pct + '%',\n      barStyle: this.fillStyle(pct, '#d2643c'),\n      phaseProgress, ledgerColumns, journeyPhases, tableRows,\n      isLedger: view === 'ledger', isTable: view === 'table', isJourney: view === 'journey',\n      ledgerBtn: this.toggleBtn(view === 'ledger'),\n      tableBtn: this.toggleBtn(view === 'table'),\n      journeyBtn: this.toggleBtn(view === 'journey'),\n      viewHint: hints[view],\n      viewLedger: () => this.setView('ledger'),\n      viewTable: () => this.setView('table'),\n      viewJourney: () => this.setView('journey'),\n      toggle: this.toggle, commit: this.commit, reset: this.reset\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
